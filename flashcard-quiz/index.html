<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Quiz App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    /* ---- Header ---- */
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: #fff;
    }
    .header h1 span { color: #e94560; }
    .header p { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-top: 0.3rem; }

    /* ---- Subject Tabs ---- */
    .tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.8rem;
    }
    .tab {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active, .tab:hover {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    /* ---- Card Scene ---- */
    .scene {
      width: 340px;
      height: 210px;
      perspective: 1000px;
      margin-bottom: 1.5rem;
      cursor: pointer;
    }

    .card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 20px;
    }
    .card.flipped { transform: rotateY(180deg); }

    .front, .back {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .front {
      background: linear-gradient(135deg, #e94560, #c62a47);
      box-shadow: 0 20px 50px rgba(233,69,96,0.35);
    }
    .back {
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      box-shadow: 0 20px 50px rgba(0,180,216,0.35);
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.8rem;
    }
    .card-text {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.4;
    }
    .card-hint {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      margin-top: 1rem;
    }

    /* ---- Counter ---- */
    .counter {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1.2rem;
    }
    .counter span { color: #fff; font-weight: 600; }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.8rem;
    }
    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.15); }

    .flip-btn {
      padding: 0.7rem 2rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #e94560, #c62a47);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(233,69,96,0.35);
      transition: transform 0.15s;
    }
    .flip-btn:active { transform: scale(0.95); }

    /* ---- Score ---- */
    .score-wrap {
      display: flex;
      gap: 1rem;
    }
    .score-btn {
      padding: 0.55rem 1.4rem;
      border-radius: 12px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .score-btn:active { transform: scale(0.95); }
    .correct-btn {
      background: rgba(0, 200, 120, 0.15);
      color: #00c878;
      border: 1px solid rgba(0,200,120,0.3);
    }
    .wrong-btn {
      background: rgba(233,69,96,0.15);
      color: #e94560;
      border: 1px solid rgba(233,69,96,0.3);
    }

    /* ---- Stats bar ---- */
    .stats {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      text-align: center;
    }
    .stat .val {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }
    .stat .lbl {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .stat.correct .val { color: #00c878; }
    .stat.wrong   .val { color: #e94560; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Flash<span>card</span> Quiz</h1>
    <p>Click the card to reveal the answer 🎯</p>
  </div>

  <!-- Subject Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Counter -->
  <div class="counter">Card <span id="current">1</span> of <span id="total">1</span></div>

  <!-- Flashcard -->
  <div class="scene" onclick="flipCard()">
    <div class="card" id="card">
      <div class="front">
        <div class="card-label">❓ Question</div>
        <div class="card-text" id="questionText"></div>
        <div class="card-hint">Tap to reveal answer</div>
      </div>
      <div class="back">
        <div class="card-label">✅ Answer</div>
        <div class="card-text" id="answerText"></div>
        <div class="card-hint">Tap to go back</div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <button class="nav-btn" onclick="prevCard()">◀</button>
    <button class="flip-btn" onclick="flipCard()">🔄 Flip</button>
    <button class="nav-btn" onclick="nextCard()">▶</button>
  </div>

  <!-- Score buttons -->
  <div class="score-wrap">
    <button class="score-btn correct-btn" onclick="markScore(true)">✓ Got it!</button>
    <button class="score-btn wrong-btn"   onclick="markScore(false)">✗ Missed</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat correct">
      <div class="val" id="correctCount">0</div>
      <div class="lbl">Correct</div>
    </div>
    <div class="stat">
      <div class="val" id="totalAnswered">0</div>
      <div class="lbl">Answered</div>
    </div>
    <div class="stat wrong">
      <div class="val" id="wrongCount">0</div>
      <div class="lbl">Missed</div>
    </div>
  </div>

  <script>
    const data = {
      "Maths": [
        { q: "What is the value of π (pi)?",        a: "3.14159..." },
        { q: "What is √144?",                        a: "12" },
        { q: "Formula for area of a circle?",        a: "A = πr²" },
        { q: "What is 12 × 12?",                     a: "144" },
        { q: "Expand (a+b)²",                        a: "a² + 2ab + b²" },
      ],
      "Science": [
        { q: "Chemical formula of water?",           a: "H₂O" },
        { q: "What is Newton's 2nd law?",            a: "F = ma" },
        { q: "Speed of light?",                      a: "3 × 10⁸ m/s" },
        { q: "What is photosynthesis?",              a: "Plants make food using sunlight, CO₂ & water" },
        { q: "Atomic number of Carbon?",             a: "6" },
      ],
      "History": [
        { q: "India got independence in?",           a: "1947" },
        { q: "Who wrote the Indian Constitution?",   a: "Dr. B.R. Ambedkar" },
        { q: "First PM of India?",                   a: "Jawaharlal Nehru" },
        { q: "Battle of Panipat (1st) was in?",      a: "1526" },
        { q: "Quit India Movement year?",            a: "1942" },
      ],
      "CS": [
        { q: "Full form of CPU?",                    a: "Central Processing Unit" },
        { q: "What does HTML stand for?",            a: "HyperText Markup Language" },
        { q: "Array indexing starts at?",            a: "0 (zero)" },
        { q: "What is a loop?",                      a: "Repeating a block of code multiple times" },
        { q: "Full form of CSS?",                    a: "Cascading Style Sheets" },
      ],
      "English": [
        { q: "What is a noun?",                      a: "A word that names a person, place, or thing" },
        { q: "Opposite of 'ancient'?",               a: "Modern" },
        { q: "What is a synonym?",                   a: "A word with the same meaning as another" },
        { q: "Plural of 'child'?",                   a: "Children" },
        { q: "What is a metaphor?",                  a: "Comparing two things without using 'like' or 'as'" },
      ],
    };

    let subject  = "Maths";
    let cards    = data[subject];
    let index    = 0;
    let isFlipped = false;
    let correct  = 0, wrong = 0, answered = 0;

    // Build tabs
    const tabsEl = document.getElementById('tabs');
    Object.keys(data).forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (sub === subject ? ' active' : '');
      btn.textContent = sub;
      btn.onclick = () => switchSubject(sub);
      tabsEl.appendChild(btn);
    });

    function switchSubject(sub) {
      subject = sub;
      cards   = data[sub];
      index   = 0;
      isFlipped = false;
      document.getElementById('card').classList.remove('flipped');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tabsEl.querySelectorAll('.tab')[Object.keys(data).indexOf(sub)].classList.add('active');
      updateCard();
    }

    function updateCard() {
      document.getElementById('questionText').textContent = cards[index].q;
      document.getElementById('answerText').textContent   = cards[index].a;
      document.getElementById('current').textContent      = index + 1;
      document.getElementById('total').textContent        = cards.length;
      isFlipped = false;
      document.getElementById('card').classList.remove('flipped');
    }

    function flipCard() {
      isFlipped = !isFlipped;
      document.getElementById('card').classList.toggle('flipped', isFlipped);
    }

    function nextCard() {
      index = (index + 1) % cards.length;
      updateCard();
    }

    function prevCard() {
      index = (index - 1 + cards.length) % cards.length;
      updateCard();
    }

    function markScore(isCorrect) {
      answered++;
      if (isCorrect) correct++; else wrong++;
      document.getElementById('correctCount').textContent  = correct;
      document.getElementById('wrongCount').textContent    = wrong;
      document.getElementById('totalAnswered').textContent = answered;
      nextCard();
    }

    updateCard();
  </script>

</body>
</html>
