<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Countdown Timer</h1>
        <p>Set a duration and start the countdown.</p>
      </header>

      <section class="timer">
        <p id="display" class="display">00:00:00</p>
        <div class="inputs">
          <div class="field">
            <label for="hours">Hours</label>
            <input id="hours" type="number" min="0" max="99" step="1" />
          </div>
          <div class="field">
            <label for="minutes">Minutes</label>
            <input id="minutes" type="number" min="0" max="59" step="1" />
          </div>
          <div class="field">
            <label for="seconds">Seconds</label>
            <input id="seconds" type="number" min="0" max="59" step="1" />
          </div>
        </div>
        <div class="controls">
          <button id="start" type="button">Start</button>
          <button id="pause" type="button" disabled>Pause</button>
          <button id="reset" type="button" disabled>Reset</button>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
